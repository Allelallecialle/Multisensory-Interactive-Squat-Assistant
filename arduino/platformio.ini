; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy36]
platform = teensy
board = teensy36
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<IMU_code_UI_connected_ArduinoAndMediapipe.cpp> -<FSR_values.cpp> -<test_imu.cpp>
lib_deps = 
	adafruit/Adafruit BusIO@^1.17.4
	adafruit/Adafruit BNO055@^1.6.4
	adafruit/Adafruit Unified Sensor@^1.1.15
	https://github.com/tttapa/Filters.git


[env:FSR]
build_flags = -FSR
platform = teensy
board = teensy36
framework = arduino
build_src_filter = -<*> +<FSR_values.cpp>
lib_deps = 
	adafruit/Adafruit BusIO@^1.17.4
	adafruit/Adafruit BNO055@^1.6.4
	adafruit/Adafruit Unified Sensor@^1.1.15
	https://github.com/tttapa/Filters.git


[env:test_imu]
platform = teensy
board = teensy36
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<test_imu.cpp>


[env:native]
platform = native
test_framework = unity
build_flags =
	-std=gnu++14
	-I test/test_calibration/mocks
test_build_src_filter = -<*> +<config.cpp> +<utils.cpp>

